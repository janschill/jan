site: Jan Schill
url: https://janschill.de
title: Jan Schill
tagline: Jan's Blog
description: Jan Schill — software engineer in Oslo, writing about engineering, side projects, and life.
twitter:
  username: janschill
  card: summary
  creator: janschill
author:
  twitter: janschill
  name: Jan Schill
  avatar:
  email: blog@janschill.de
  url: https://janschill.de
social:
  name: Jan Schill
  links:
    - https://bsky.app/profile/janschill.bsky.social
    - https://janschill.de/webid.ttl#me
permalink: pretty

baseurl: ""

highlighter: none

exclude:
  - .jekyll-cache

compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]

sass:
  sass_dir:          _sass
  style:            :compressed

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:year/:month/:day/:slug
  experiences:
    output: false

defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
